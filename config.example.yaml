# talk-rs Configuration File
# 
# This file contains all required settings for talk-rs operation.
# Replace all <PLACEHOLDER> values with your actual configuration.
# 
# For more information, see: https://github.com/talk-rs/talk-rs

# Required: Output directory for recordings, screenshots, and clipboard saves
# Must be an absolute path that exists and is writable
output_dir: <PLACEHOLDER>

# Required: Transcription Providers Configuration
# Configure transcription backends (currently supports Mistral)
providers:
  # Mistral API Configuration
  # Used for audio transcription and processing
  mistral:
    # Your Mistral API key for authentication
    # Get this from: https://console.mistral.ai/
    api_key: <PLACEHOLDER>

# Required: Audio Capture and Encoding Settings
# These settings control how audio is captured and processed
audio:
  # Sample rate in Hz (e.g., 16000 for 16kHz, 44100 for CD quality)
  # Common values: 8000, 16000, 44100, 48000
  sample_rate: <PLACEHOLDER>
  
  # Number of audio channels
  # 1 = mono (single channel), 2 = stereo (dual channel)
  channels: <PLACEHOLDER>
  
  # Bitrate in bits per second for compressed formats
  # Common values: 32000, 64000, 128000, 192000
  # Only used for compressed audio formats (e.g., MP3, AAC)
  bitrate: <PLACEHOLDER>

# Optional: Dictation Mode Settings
# Configure behavior when using --chunked mode for long recordings
dictate:
  # Size of audio chunks in seconds for processing
  # Smaller values = more frequent processing, larger values = fewer API calls
  chunk_seconds: 2

# Optional: Visual and Audio Indicators
# Configure feedback mechanisms during recording
indicators:
  # Interval between boop sounds in milliseconds
  # Set to 0 to disable audio feedback
  boop_interval_ms: 5000
  
  # Show visual indicator overlay during recording
  # Set to false to disable visual feedback
  visual_overlay: true
